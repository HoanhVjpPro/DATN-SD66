<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Đăng ký – HatHub</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&family=Barlow+Condensed:wght@400;600;700;900&display=swap" rel="stylesheet"/>
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
        :root{
            --black:#111111;--off-black:#1a1a1a;
            --rust:#C0633A;--rust-light:#D97C4E;--rust-dark:#9B4A27;
            --white:#ffffff;--cream:#F5F0EA;
            --gray-100:#f0efee;--gray-200: #ffffff;--gray-400:#9e9b96;--gray-700:#3e3d3a;
            --font-display:'Barlow Condensed',sans-serif;
            --font-body:'Nunito',sans-serif;
        }
        html,body{height:100%;}
        body{font-family:var(--font-body);background:var(--black);color:var(--black);display:flex;flex-direction:column;min-height:100vh;}

        nav{background:var(--black);display:flex;align-items:center;justify-content:space-between;padding:0 2.5rem;height:64px;border-bottom:1px solid #222;flex-shrink:0;}
        .nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
        .nav-logo img{height:44px;width:auto;object-fit:contain;border-radius:50%;}
        .nav-logo-text{font-family:var(--font-display);font-size:1.7rem;font-weight:900;color:var(--white);letter-spacing:1px;text-transform:lowercase;}
        .nav-logo-text span{color:var(--rust);}
        .nav-back{color:var(--gray-400);text-decoration:none;font-size:0.82rem;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;transition:color 0.2s;}
        .nav-back:hover{color:var(--rust-light);}

        .auth-wrapper{flex:1;display:grid;grid-template-columns:1fr 1fr;}

        .auth-left{background:var(--off-black);display:flex;align-items:center;justify-content:center;padding:4rem 3rem;position:relative;overflow:hidden;}
        .auth-left::before{content:'';position:absolute;width:420px;height:420px;border-radius:50%;border:1px solid rgba(192,99,58,0.15);top:-120px;right:-120px;}
        .auth-left::after{content:'';position:absolute;width:260px;height:260px;border-radius:50%;border:1px solid rgba(192,99,58,0.1);bottom:-70px;left:-70px;}
        .auth-left-content{position:relative;z-index:2;text-align:center;}
        .auth-left-logo{width:130px;height:130px;border-radius:50%;object-fit:cover;margin:0 auto 1.8rem;display:block;box-shadow:0 0 0 4px var(--rust),0 0 0 8px rgba(192,99,58,0.2);}
        .auth-brand{font-family:var(--font-display);font-size:3.2rem;font-weight:900;color:var(--white);text-transform:lowercase;line-height:1;margin-bottom:0.4rem;}
        .auth-brand span{color:var(--rust);}
        .auth-tagline{font-size:0.75rem;color:var(--gray-400);letter-spacing:0.15em;text-transform:uppercase;margin-bottom:2.5rem;}
        .auth-quote{font-family:var(--font-display);font-size:1.55rem;font-weight:700;color:var(--white);line-height:1.25;max-width:260px;margin:0 auto;}
        .auth-quote em{color:var(--rust);font-style:normal;}

        .auth-right{background:var(--white);display:flex;align-items:center;justify-content:center;padding:3rem;}
        .auth-card{width:100%;max-width:440px;}
        .auth-title{font-family:var(--font-display);font-weight:900;font-size:2.6rem;text-transform:uppercase;line-height:1;color:var(--black);margin-bottom:0.4rem;}
        .auth-subtitle{font-size:0.88rem;color:var(--gray-400);margin-bottom:1.8rem;}
        .auth-subtitle a{color:var(--rust);text-decoration:none;font-weight:700;}
        .auth-subtitle a:hover{text-decoration:underline;}

        .alert{padding:12px 16px;margin-bottom:1.2rem;font-size:0.88rem;font-weight:600;border-left:3px solid;}
        .alert-error{background:#fff5f5;color:#c53030;border-color:#e53e3e;}
        .alert-success{background:#f0fff4;color:#276749;border-color:#48bb78;}

        /* field errors từ Thymeleaf binding */
        .field-error{font-size:0.75rem;color:#e53e3e;margin-top:4px;display:block;}

        .form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
        .form-group{margin-bottom:1rem;}
        .form-label{display:block;font-size:0.75rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--gray-700);margin-bottom:6px;}
        .form-input{width:100%;padding:11px 14px;border:1.5px solid var(--gray-200);font-family:var(--font-body);font-size:0.93rem;color:var(--black);background:var(--white);outline:none;transition:border-color 0.2s;}
        .form-input:focus{border-color:var(--rust);}
        .form-input::placeholder{color:var(--gray-400);}
        .form-input.is-error{border-color:#e53e3e;}

        .password-wrapper{position:relative;}
        .password-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--gray-400);font-size:1rem;padding:4px;}
        .password-toggle:hover{color:var(--rust);}

        /* strength bar */
        .strength-bar{height:3px;background:var(--gray-200);margin-top:6px;}
        .strength-fill{height:100%;width:0%;transition:all 0.3s;}
        .strength-text{font-size:0.73rem;color:var(--gray-400);margin-top:3px;display:block;}

        .form-check{display:flex;align-items:flex-start;gap:8px;margin-top:0.8rem;}
        .form-check input[type=checkbox]{width:16px;height:16px;accent-color:var(--rust);cursor:pointer;margin-top:2px;flex-shrink:0;}
        .form-check label{font-size:0.83rem;color:var(--gray-700);cursor:pointer;line-height:1.5;}
        .form-check a{color:var(--rust);text-decoration:none;font-weight:600;}

        .btn-submit{width:100%;padding:14px;background:var(--rust);color:var(--white);border:none;font-family:var(--font-body);font-weight:700;font-size:0.95rem;letter-spacing:0.06em;text-transform:uppercase;cursor:pointer;transition:background 0.2s;margin-top:1.2rem;}
        .btn-submit:hover{background:var(--rust-dark);}

        .divider{display:flex;align-items:center;gap:1rem;margin:1.2rem 0;color:var(--gray-400);font-size:0.8rem;}
        .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--gray-200);}

        @media(max-width:768px){
            .auth-left{display:none;}
            .auth-wrapper{grid-template-columns:1fr;}
            .auth-right{padding:2rem 1.2rem;}
            .form-row{grid-template-columns:1fr;}
        }
    </style>
</head>
<body>

<nav>
    <a href="/" class="nav-logo" th:href="@{/}">
        <img th:src="@{/logo.jpg}" src="/logo.jpg" alt="HatHub Logo" style="height:44px;width:auto;object-fit:contain;border-radius:50%;"/>

        <span class="nav-logo-text">hat<span>hub</span></span>
    </a>
    <a href="/" class="nav-back" th:href="@{/}">← Về trang chủ</a>
</nav>

<div class="auth-wrapper">
    <!-- LEFT -->
    <div class="auth-left">
        <div class="auth-left-content">
            <img th:src="@{/logo.jpg}" alt="HatHub" class="auth-left-logo"/>
            <div class="auth-brand">hat<span>hub</span></div>
            <div class="auth-tagline">Mũ thời trang · Phong cách</div>
            <div class="auth-quote">Tham gia cộng đồng<br/><em>HatHub</em> ngay hôm nay</div>
        </div>
    </div>

    <!-- RIGHT -->
    <div class="auth-right">
        <div class="auth-card">
            <h1 class="auth-title">Đăng ký</h1>
            <p class="auth-subtitle">
                Đã có tài khoản?
                <a href="/login" th:href="@{/login}">Đăng nhập</a>
            </p>

            <div class="alert alert-error" th:if="${error}" th:text="${error}"></div>
            <div class="alert alert-success" th:if="${success}" th:text="${success}"></div>

            <!--
              th:object="${registerDTO}" nếu dùng DTO binding
              Hoặc bỏ th:object và dùng name thuần
            -->
            <form method="POST" action="/register" th:action="@{/register}" onsubmit="return validateRegister()">

                <!-- Username -->
                <div class="form-group">
                    <label class="form-label" for="username">Tên đăng nhập *</label>
                    <input type="text" id="username" name="username" class="form-input"
                           placeholder="Tối thiểu 4 ký tự, không dấu"
                           th:value="${param.username}"
                           autocomplete="username" required/>
                    <span class="field-error" th:if="${usernameError}" th:text="${usernameError}"></span>
                </div>

                <!-- Email + Phone -->
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" for="email">Email *</label>
                        <input type="email" id="email" name="email" class="form-input"
                               placeholder="example@email.com"
                               th:value="${param.email}"
                               autocomplete="email" required/>
                        <span class="field-error" th:if="${emailError}" th:text="${emailError}"></span>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="phone">Số điện thoại</label>
                        <input type="tel" id="phone" name="phone" class="form-input"
                               placeholder="0912 345 678"
                               th:value="${param.phone}"
                               autocomplete="tel"/>
                    </div>
                </div>

                <!-- Password -->
                <div class="form-group">
                    <label class="form-label" for="password">Mật khẩu *</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" name="password" class="form-input"
                               placeholder="Nhập mật khẩu"
                               autocomplete="new-password"
                               oninput="checkStrength(this.value)" required/>
                        <button type="button" class="password-toggle" onclick="togglePass('password',this)">Hiện</button>
                    </div>
                    <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
                    <span class="strength-text" id="strengthText"></span>
                    <span class="field-error" th:if="${passwordError}" th:text="${passwordError}"></span>
                </div>

                <!-- Confirm Password -->
                <div class="form-group">
                    <label class="form-label" for="confirmPassword">Xác nhận mật khẩu *</label>
                    <div class="password-wrapper">
                        <input type="password" id="confirmPassword" name="confirmPassword" class="form-input"
                               placeholder="Nhập lại mật khẩu"
                               autocomplete="new-password" required/>
                        <button type="button" class="password-toggle" onclick="togglePass('confirmPassword',this)">Hiện</button>
                    </div>
                    <span class="field-error" id="confirmError"></span>
                </div>

                <!-- Terms -->
                <div class="form-check">
                    <input type="checkbox" id="agreeTerms" name="agreeTerms" required/>
                    <label for="agreeTerms">
                        Tôi đồng ý với <a href="/terms" th:href="@{/terms}">Điều khoản dịch vụ</a>
                        và <a href="/privacy" th:href="@{/privacy}">Chính sách bảo mật</a> của HatHub
                    </label>
                </div>

                <button type="submit" class="btn-submit">Tạo tài khoản</button>
            </form>

            <div class="divider">đã có tài khoản?</div>
            <p style="text-align:center;font-size:0.85rem;">
                <a href="/login" th:href="@{/login}" style="color:var(--rust);font-weight:700;text-decoration:none;">→ Quay lại đăng nhập</a>
            </p>
        </div>
    </div>
</div>

<script>
    function togglePass(id, btn) {
        const input = document.getElementById(id);
        input.type = input.type === 'password' ? 'text' : 'password';
        btn.textContent = input.type === 'password' ? 'Hiện' : 'Ẩn';
    }

    function checkStrength(val) {
        const fill = document.getElementById('strengthFill');
        const text = document.getElementById('strengthText');
        let score = 0;
        if (val.length >= 6)  score++;
        if (val.length >= 10) score++;
        if (/[0-9]/.test(val)) score++;
        if (/[^A-Za-z0-9]/.test(val)) score++;
        const levels = [
            {w:'0%',  color:'#e53e3e', label:''},
            {w:'25%', color:'#e53e3e', label:'Yếu'},
            {w:'50%', color:'#ed8936', label:'Trung bình'},
            {w:'75%', color:'#ecc94b', label:'Khá'},
            {w:'100%',color:'#48bb78', label:'Mạnh'},
        ];
        fill.style.width   = levels[score].w;
        fill.style.background = levels[score].color;
        text.textContent = val.length > 0 ? 'Độ mạnh: ' + levels[score].label : '';
    }

    function validateRegister() {
        const u  = document.getElementById('username').value.trim();
        const e  = document.getElementById('email').value.trim();
        const p  = document.getElementById('password').value;
        const cp = document.getElementById('confirmPassword').value;
        const err = document.getElementById('confirmError');

        if (!u || !e || !p || !cp) { alert('Vui lòng nhập đầy đủ thông tin bắt buộc!'); return false; }
        if (u.length < 4) { alert('Tên đăng nhập tối thiểu 4 ký tự!'); return false; }
        if (p !== cp) {
            err.textContent = 'Mật khẩu xác nhận không khớp!';
            document.getElementById('confirmPassword').classList.add('is-error');
            return false;
        }
        err.textContent = '';
        if (!document.getElementById('agreeTerms').checked) {
            alert('Vui lòng đồng ý với điều khoản dịch vụ!'); return false;
        }
        return true;
    }

    // Clear confirm error on input
    document.getElementById('confirmPassword').addEventListener('input', function() {
        document.getElementById('confirmError').textContent = '';
        this.classList.remove('is-error');
    });
</script>
</body>
</html>
