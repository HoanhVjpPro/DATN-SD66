<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title th:text="'Đơn #' + ${order.orderId} + ' | HatHub'">Order</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet"/>
  <style>
    body { font-family:'Nunito',sans-serif; background:#F5F0EA; margin:0; }
    nav { background:#111; padding:1rem 2rem; }
    nav a { color:#fff; text-decoration:none; font-weight:700; }
    .container { max-width:800px; margin:2rem auto; padding:0 1rem; }
    .card { background:#fff; padding:1.5rem; border-radius:8px; margin-bottom:1rem; }
    .success { background:#d4edda; color:#155724; padding:1rem; border-radius:4px; margin-bottom:1rem; }
    table { width:100%; border-collapse:collapse; }
    td, th { padding:0.75rem; border-bottom:1px solid #eee; text-align:left; }
  </style>
</head>
<body>
<nav><a href="/orders">← Đơn hàng</a></nav>
<div class="container">
  <div th:if="${success}" class="success" th:text="${success}"></div>
  <h1 th:text="'Đơn hàng #' + ${order.orderId}">Order</h1>
  <div class="card">
    <p><strong>Trạng thái:</strong> <span th:text="${order.status}">status</span></p>
    <p><strong>Ngày đặt:</strong> <span th:text="${#temporals.format(order.orderDate, 'dd/MM/yyyy HH:mm')}">date</span></p>
    <p><strong>Tổng tiền:</strong> <span th:text="${#numbers.formatDecimal(order.totalAmount, 0, 'COMMA', 0, 'POINT')} + ' đ'">0</span></p>
    <p th:if="${order.shipping != null}"><strong>Địa chỉ:</strong> <span th:text="${order.shipping.shippingAddress}">addr</span></p>
    <p th:if="${order.payment != null}"><strong>Thanh toán:</strong> <span th:text="${order.payment.paymentMethod} + ' - ' + ${order.payment.paymentStatus}">pay</span></p>
  </div>

  <div th:if="${order.payment != null
               and order.payment.paymentMethod == 'Chuyển khoản'
               and order.status == 'Chờ thanh toán'}"
         style="margin-top:1rem;padding-top:1rem;border-top:1px solid #eee;">
    <div class="card">
      <p style="color:#e67e22;font-weight:700;">⚠ Đơn hàng chưa được thanh toán</p>
      <a th:href="@{/payment/qr/{id}(id=${order.orderId})}"
         style="display:inline-block;background:#C0633A;color:#fff;padding:10px 24px;text-decoration:none;font-weight:700;border-radius:4px;margin-top:0.5rem;">
        💳 Thanh toán ngay
      </a>
    </div>
  </div>

  <div th:if="${order.status == 'Chờ xác nhận'}"
       style="margin-top:1rem;padding-top:1rem;border-top:1px solid #eee;">
    <div class="card">
      <form th:action="@{/admin/orders/{id}(id=${order.orderId})}" method="post"
            onsubmit="return confirm('Xác nhận hủy đơn hàng?')">
        <button type="submit"
                style="background:#ff0000;color:#fff;border:none;padding:10px 24px;font-weight:700;cursor:pointer;border-radius:4px;margin-top:0.5rem;">
          Xác nhân hủy đơn
        </button>
      </form>
    </div>
  </div>

  <div th:if="${order.status == 'Đang giao'}"
       style="margin-top:1rem;padding-top:1rem;border-top:1px solid #eee;">
    <div class="card">
      <p style="color:#2980b9;font-weight:700;">🚚 Đơn hàng đang trên đường giao đến bạn</p>
      <form th:action="@{/orders/{id}/received(id=${order.orderId})}" method="post"
            onsubmit="return confirm('Xác nhận đã nhận được hàng?')">
        <button type="submit"
                style="background:#27ae60;color:#fff;border:none;padding:10px 24px;font-weight:700;cursor:pointer;border-radius:4px;margin-top:0.5rem;">
          ✓ Đã nhận được hàng
        </button>
      </form>
    </div>
  </div>

  <div th:if="${order.status == 'Hoàn thành'}"
       style="margin-top:1rem;padding-top:1rem;border-top:1px solid #eee;">
    <div class="card">
        <button id="btnReturn" type="button" onclick="toggleForm()"
                style="background:#e40000;color:#fff;border:none;padding:10px 24px;font-weight:700;cursor:pointer;border-radius:4px;margin-top:0.5rem;">
          Yêu cầu trả hàng/ hoàn tiền
        </button>
      <h5>sau ##/##/202# thì quý khách không thể trả hàng được nữa!</h5>
    </div>
    <form class="card form-box" style="display: none" id="returnForm">
      <select>
        <option value="Hàng bị bể/ vỡ trong quá trình vận chuyển">Hàng bị bể/ vỡ trong quá trình vận chuyển</option>
        <option value="Hàng không đúng trong ảnh và miêu tả">Hàng không đúng trong ảnh và miêu tả</option>
        <option value="Bị sai kích cỡ/ màu sắc">Bị sai kích cỡ/ màu sắc</option>
        <option value="Không đúng sản phẩm đã đặt">Không đúng sản phẩm đã đặt</option>
        <option value="Khác...">Khác...</option>
      </select><br><br>
      <textarea rows="8" placeholder="Chi tiết"></textarea> <br> <br>
      <button type="submit">Gửi yêu cầu</button>
    </form>
  </div>

  <div class="card">
    <h3>Sản phẩm</h3>
    <table>
      <tr th:each="d : ${order.details}">
        <td th:text="${d.productDetail.product.productName}">Product</td>
        <td th:text="${d.productDetail.size} + ' / ' + ${d.productDetail.color}">variant</td>
        <td th:text="${d.quantity} + ' x ' + ${#numbers.formatDecimal(d.unitPrice, 0, 'COMMA', 0, 'POINT')} + ' đ'">qty</td>
      </tr>
    </table>
  </div>
</div>
</body>
<script>
  function toggleForm() {
    const form = document.getElementById("returnForm");

    const btn = document.getElementById("btnReturn");

    if (btn.textContent.trim() === "Yêu cầu trả hàng/ hoàn tiền") {
      form.style.display =
              form.style.display === "none" ? "block" : "none";
      btn.textContent = "Hủy trả hàng";
    } else {
      form.style.display =
              form.style.display === "none" ? "block" : "none";
      btn.textContent = "Yêu cầu trả hàng/ hoàn tiền";
    }
  }
</script>
</html>
