<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>Quản lý đơn hàng | HatHub Staff</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet"/>
  <style>
    body { font-family:'Nunito',sans-serif; margin:0; display:flex; min-height:100vh; }
    aside { width:220px; background:#111; color:#fff; padding:1.5rem; }
    aside a { display:block; color:#ccc; text-decoration:none; padding:0.6rem 0; }
    aside a.active { color:#C0633A; }
    main { flex:1; padding:2rem; background:#F5F0EA; }
    table { width:100%; background:#fff; border-collapse:collapse; }
    th, td { padding:0.75rem; border-bottom:1px solid #eee; font-size:0.9rem; }
    th { background:#111; color:#fff; }
    select, button { padding:6px; }
    button { background:#C0633A; color:#fff; border:none; cursor:pointer; }
  </style>
</head>
<body>
<aside>
  <h2 style="color:#C0633A;">HatHub Staff</h2>
  <a href="/employee/dashboard">Dashboard</a>
  <a href="/employee/orders" class="active">Đơn hàng</a>
  <a href="/logout">Đăng xuất</a>
</aside>
<main>
  <h1>Xử lý đơn hàng</h1>
  <table>
    <thead><tr><th>Mã</th><th>Khách</th><th>Ngày</th><th>Tổng</th><th>Trạng thái</th><th>Cập nhật</th></tr></thead>
    <tbody>
      <tr th:each="o : ${orders}">
        <td th:text="'#' + ${o.orderId}">#1</td>
        <td th:text="${o.customer.user.username}">user</td>
        <td th:text="${#temporals.format(o.orderDate, 'dd/MM/yyyy HH:mm')}">date</td>
        <td th:text="${#numbers.formatDecimal(o.totalAmount, 0, 'COMMA', 0, 'POINT')} + ' đ'">0</td>
        <td th:text="${o.status}">status</td>
        <td>
          <form th:action="@{/employee/orders/{id}/status(id=${o.orderId})}" method="post" style="display:flex;gap:4px;">
            <select name="status">
              <option value="Chờ xác nhận">Chờ xác nhận</option>
              <option value="Đang xử lý">Đang xử lý</option>
              <option value="Đang giao">Đang giao</option>
              <option value="Hoàn thành">Hoàn thành</option>
              <option value="Đã hủy">Đã hủy</option>
            </select>
            <button type="submit">✓</button>
          </form>
        </td>
      </tr>
    </tbody>
  </table>
</main>
</body>
</html>
