<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>Employee Dashboard | HatHub</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet"/>
  <style>
    body { font-family:'Nunito',sans-serif; margin:0; display:flex; min-height:100vh; }
    aside { width:220px; background:#111; color:#fff; padding:1.5rem; }
    aside a { display:block; color:#ccc; text-decoration:none; padding:0.6rem 0; }
    aside a.active { color:#C0633A; }
    main { flex:1; padding:2rem; background:#F5F0EA; }
    .stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:1rem; }
    .stat { background:#fff; padding:1.5rem; border-radius:8px; }
    .stat-num { font-size:2rem; font-weight:900; color:#C0633A; }
  </style>
</head>
<body>
<aside>
  <h2 style="color:#C0633A;">HatHub Staff</h2>
  <a href="/employee/dashboard" class="active">Dashboard</a>
  <a href="/employee/orders">Đơn hàng</a>
  <a href="/logout">Đăng xuất</a>
</aside>
<main>
  <h1>Dashboard Nhân viên</h1>
  <div class="stats">
    <div class="stat"><div class="stat-num" th:text="${totalOrders}">0</div><div>Tổng đơn</div></div>
    <div class="stat"><div class="stat-num" th:text="${pendingOrders}">0</div><div>Chờ xác nhận</div></div>
    <div class="stat"><div class="stat-num" th:text="${shippingOrders}">0</div><div>Đang giao</div></div>
    <div class="stat"><div class="stat-num" th:text="${completedOrders}">0</div><div>Hoàn thành</div></div>
  </div>
</main>
</body>
</html>
