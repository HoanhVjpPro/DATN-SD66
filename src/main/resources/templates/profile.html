<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>Tài khoản | HatHub</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet"/>
  <style>
    body { font-family:'Nunito',sans-serif; background:#F5F0EA; margin:0; }
    nav { background:#111; padding:1rem 2rem; }
    nav a { color:#fff; text-decoration:none; font-weight:700; }
    .container { max-width:500px; margin:2rem auto; padding:0 1rem; }
    form { background:#fff; padding:2rem; border-radius:8px; }
    label { display:block; font-weight:700; margin:1rem 0 0.5rem; }
    input { width:100%; padding:10px; border:1px solid #ddd; border-radius:4px; }
    button { background:#C0633A; color:#fff; border:none; padding:12px; width:100%; font-weight:700; margin-top:1rem; cursor:pointer; }
    .success { background:#d4edda; color:#155724; padding:1rem; border-radius:4px; margin-bottom:1rem; }
    .error { background: #fd4040; color: #ffffff; padding:1rem; border-radius:4px; margin-bottom:1rem; }
    .btn-cart {
      background: var(--rust) !important;
      border: none !important; border-radius: 4px !important;
      padding: 8px 18px !important; font-family: var(--font-body);
      font-size: 0.8rem !important; font-weight: 700 !important;
      letter-spacing: 0.05em; color: var(--white) !important;
      cursor: pointer; transition: background 0.2s !important;
    }
    .btn-cart:hover { background: var(--rust-dark) !important; }
    a{
      text-decoration: none;
    }
  </style>
</head>
<body>
<nav><a href="/">← HatHub</a></nav>
<div class="container">
  <h1>Tài khoản</h1>
  <div th:if="${success}" class="success" th:text="${success}"></div>
  <div th:if="${error}" class="error" th:text="${error}"></div>
  <form action="/profile/update" method="post">
    <label>Tên đăng nhập</label>
    <input th:value="${user.username}" disabled/>
    <label>Email</label>
    <input type="email" name="email" th:value="${user.email}"/>
    <label>Số điện thoại</label>
    <input type="text" name="phone" th:value="${user.phone}"/>
    <button type="submit">Cập nhật</button>
    <button type="button"><a href="/orders" class="btn-cart">Đơn hàng của bạn</a></button>
  </form>
  <form action="/profile/change-password" method="post">
    <h2 style="margin-top:0;">Đổi mật khẩu</h2>
    <label>Mật khẩu hiện tại</label>
    <input type="password" name="oldPassword" required />

    <label>Mật khẩu mới</label>
    <input type="password" name="newPassword" required minlength="4" />

    <label>Xác nhận mật khẩu mới</label>
    <input type="password" name="confirmPassword" required minlength="4" />

    <button type="submit" class="btn-password">Đổi mật khẩu</button>
  </form>
</div>
</body>
</html>
