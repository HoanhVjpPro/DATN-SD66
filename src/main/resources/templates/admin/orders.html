<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>Quản lý đơn hàng | HatHub</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet"/>
  <style>
    body { font-family:'Nunito',sans-serif; margin:0; display:flex; min-height:100vh; }
    aside { width:220px; background:#111; color:#fff; padding:1.5rem; }
    aside a { display:block; color:#ccc; text-decoration:none; padding:0.6rem 0; }
    aside a.active { color:#C0633A; }
    main { flex:1; padding:2rem; background:#F5F0EA; }
    table { width:100%; background:#fff; border-collapse:collapse; }
    th, td { padding:0.75rem; border-bottom:1px solid #eee; text-align:left; font-size:0.9rem; }
    th { background:#111; color:#fff; }
    select, button { padding:6px; }
    button { background:#C0633A; color:#fff; border:none; cursor:pointer; }
  </style>
</head>
<body>
<aside>
  <h2 style="color:#C0633A;">HatHub Admin</h2>
  <a href="/admin/dashboard">Dashboard</a>
  <a href="/admin/products">Sản phẩm</a>
  <a href="/admin/categories">Danh mục</a>
  <a href="/admin/orders" class="active">Đơn hàng</a>
  <a href="/admin/vouchers">Voucher</a>
  <a href="/admin/users">Người dùng</a>
  <a href="/logout">Đăng xuất</a>
</aside>
<main>
  <h1>Đơn hàng</h1>
  <table>
    <thead><tr><th>Mã</th><th>Khách hàng</th><th>Ngày</th><th>Tổng</th><th>Trạng thái</th><th>Cập nhật</th></tr></thead>
    <tbody>
      <tr th:each="o : ${orders}">
        <td th:text="'#' + ${o.orderId}">#1</td>
        <td th:text="${o.customer.user.username}">user</td>
        <td th:text="${#temporals.format(o.orderDate, 'dd/MM/yyyy')}">date</td>
        <td th:text="${#numbers.formatDecimal(o.totalAmount, 0, 'COMMA', 0, 'POINT')} + ' đ'">0</td>
        <td th:text="${o.status}">status</td>
        <td>
          <!-- Chờ xác nhận → Đang xử lý hoặc Đã hủy -->
          <div th:if="${o.status == 'Chờ xác nhận'}" style="display:flex;gap:4px;">
            <form th:action="@{/admin/orders/{id}/status(id=${o.orderId})}" method="post">
              <input type="hidden" name="status" value="Đang xử lý"/>
              <button type="submit" style="background:#2980b9;color:#fff;border:none;padding:6px 10px;cursor:pointer;">Xác nhận</button>
            </form>
            <form th:action="@{/admin/orders/{id}/status(id=${o.orderId})}" method="post"
                  onsubmit="return confirm('Hủy đơn hàng này?')">
              <input type="hidden" name="status" value="Đã hủy"/>
              <button type="submit" style="background:#c00;color:#fff;border:none;padding:6px 10px;cursor:pointer;">Hủy</button>
            </form>
          </div>

          <!-- Đang xử lý → Đang giao -->
          <div th:if="${o.status == 'Đang xử lý'}">
            <form th:action="@{/admin/orders/{id}/status(id=${o.orderId})}" method="post">
              <input type="hidden" name="status" value="Đang giao"/>
              <button type="submit" style="background:#e67e22;color:#fff;border:none;padding:6px 10px;cursor:pointer;">Giao hàng</button>
            </form>
          </div>

          <!-- Đang giao → chờ Customer xác nhận -->
          <div th:if="${o.status == 'Đang giao'}">
            <span style="color:#888;font-size:0.85rem;">Chờ khách nhận hàng</span>
          </div>

          <!-- Hoàn thành / Đã hủy → không có nút -->
          <div th:if="${o.status == 'Hoàn thành'}">
            <span style="color:green;font-weight:700;">✓ Hoàn thành</span>
          </div>
          <div th:if="${o.status == 'Đã hủy'}">
            <span style="color:#c00;font-weight:700;">✗ Đã hủy</span>
          </div>

          <!-- Chờ thanh toán → chỉ hủy được -->
          <div th:if="${o.status == 'Chờ thanh toán'}" style="display:flex;gap:4px;">
            <span style="color:#e67e22;font-size:0.85rem;">Chờ thanh toán</span>
            <form th:action="@{/admin/orders/{id}/status(id=${o.orderId})}" method="post"
                  onsubmit="return confirm('Hủy đơn hàng này?')">
              <input type="hidden" name="status" value="Đã hủy"/>
              <button type="submit" style="background:#c00;color:#fff;border:none;padding:6px 10px;cursor:pointer;">Hủy</button>
            </form>
          </div>
        </td>
      </tr>
    </tbody>
  </table>
</main>
</body>
</html>
