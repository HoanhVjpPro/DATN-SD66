<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>Voucher | HatHub</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet"/>
  <style>
    body { font-family:'Nunito',sans-serif; margin:0; display:flex; min-height:100vh; }
    aside { width:220px; background:#111; color:#fff; padding:1.5rem; }
    aside a { display:block; color:#ccc; text-decoration:none; padding:0.6rem 0; }
    aside a.active { color:#C0633A; }
    main { flex:1; padding:2rem; background:#F5F0EA; }
    table { width:100%; background:#fff; border-collapse:collapse; }
    th, td { padding:0.75rem; border-bottom:1px solid #eee; }
    th { background:#111; color:#fff; }
    form { background:#fff; padding:1.5rem; border-radius:8px; margin-bottom:1.5rem; }
    input { padding:8px; border:1px solid #ddd; margin-right:0.5rem; }
    button { background:#C0633A; color:#fff; border:none; padding:8px 16px; cursor:pointer; }
  </style>
</head>
<body>
<aside>
  <h2 style="color:#C0633A;">HatHub Admin</h2>
  <a href="/admin/dashboard">Dashboard</a>
  <a href="/admin/products">Sản phẩm</a>
  <a href="/admin/categories">Danh mục</a>
  <a href="/admin/orders">Đơn hàng</a>
  <a href="/admin/vouchers" class="active">Voucher</a>
  <a href="/admin/users">Người dùng</a>
  <a href="/logout">Đăng xuất</a>
</aside>
<main>
  <h1>Voucher</h1>
  <form action="/admin/vouchers" method="post">
    <input type="text" name="code" placeholder="Mã voucher" required/>
    <input type="number" min="0" step="1000" name="discountAmount" placeholder="Giảm (VNĐ)" required/>
    <input type="number" name="quantity" placeholder="Số lượng" required/>
    <button type="submit">Thêm</button>
  </form>
  <table>
    <thead><tr><th>Mã</th><th>Giảm</th><th>Còn lại</th><th></th></tr></thead>
    <tbody>
      <tr th:each="v : ${vouchers}">
        <td th:text="${v.code}">CODE</td>
        <td th:text="${#numbers.formatDecimal(v.discountAmount, 0, 'COMMA', 0, 'POINT')} + ' đ'">0</td>
        <td  th:text="${v.quantity}"></td>
        <td>
          <form th:action="@{/admin/vouchers/delete/{id}(id=${v.voucherId})}" method="post">
            <button type="submit" style="background:#c00;">Xóa</button>
          </form>
        </td>
      </tr>
    </tbody>
  </table>
</main>
</body>
</html>
