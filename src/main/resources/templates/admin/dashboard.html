<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>Admin Dashboard | HatHub</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet"/>
  <style>
    body { font-family:'Nunito',sans-serif; margin:0; display:flex; min-height:100vh; }
    aside { width:220px; background:#111; color:#fff; padding:1.5rem; }
    aside a { display:block; color:#ccc; text-decoration:none; padding:0.6rem 0; }
    aside a:hover, aside a.active { color:#C0633A; }
    main { flex:1; padding:2rem; background:#F5F0EA; }
    .stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:1rem; }
    .stat { background:#fff; padding:1.5rem; border-radius:8px; }
    .stat-num { font-size:2rem; font-weight:900; color:#C0633A; }
  </style>
</head>
<body>
<aside>
  <h2 style="color:#C0633A;margin-bottom:1.5rem;">HatHub Admin</h2>
  <a href="/admin/dashboard" class="active">Dashboard</a>
  <a href="/admin/products">Sản phẩm</a>
  <a href="/admin/categories">Danh mục</a>
  <a href="/admin/orders">Đơn hàng</a>
  <a href="/admin/vouchers">Voucher</a>
  <a href="/admin/users">Người dùng</a>
  <a href="/logout" style="margin-top:2rem;">Đăng xuất</a>
</aside>
<main>
  <h1>Dashboard</h1>
  <div class="stats">
    <div class="stat"><div class="stat-num" th:text="${totalProducts}">0</div><div>Sản phẩm</div></div>
    <div class="stat"><div class="stat-num" th:text="${totalCategories}">0</div><div>Danh mục</div></div>
    <div class="stat"><div class="stat-num" th:text="${totalOrders}">0</div><div>Đơn hàng</div></div>
    <div class="stat"><div class="stat-num" th:text="${pendingOrders}">0</div><div>Chờ xác nhận</div></div>
    <div class="stat"><div class="stat-num" th:text="${totalUsers}">0</div><div>Người dùng</div></div>
  </div>
</main>
</body>
</html>
