<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>Quản lý danh mục | HatHub</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet"/>
  <style>
    body { font-family:'Nunito',sans-serif; margin:0; display:flex; min-height:100vh; }
    aside { width:220px; background:#111; color:#fff; padding:1.5rem; }
    aside a { display:block; color:#ccc; text-decoration:none; padding:0.6rem 0; }
    aside a:hover, aside a.active { color:#C0633A; }
    main { flex:1; padding:2rem; background:#F5F0EA; }
    table { width:100%; background:#fff; border-collapse:collapse; border-radius:8px; overflow:hidden; }
    th, td { padding:0.75rem 1rem; text-align:left; border-bottom:1px solid #eee; }
    th { background:#111; color:#fff; }
    form.inline-form { background:#fff; padding:1.5rem; border-radius:8px; margin-bottom:1.5rem; }
    input { padding:8px; border:1px solid #ddd; border-radius:4px; margin-right:0.5rem; }
    button { background:#C0633A; color:#fff; border:none; padding:8px 16px; cursor:pointer; border-radius:4px; }
    .alert { padding:1rem; border-radius:4px; margin-bottom:1rem; }
    .alert-error { background:#f8d7da; color:#721c24; }
    .alert-success { background:#d4edda; color:#155724; }
    .row-actions { display:flex; gap:6px; }
    .btn-edit { background:#444; }
    .btn-delete { background:#c00; }
  </style>
</head>
<body>
<aside>
  <h2 style="color:#C0633A;">HatHub Admin</h2>
  <a href="/admin/dashboard">Dashboard</a>
  <a href="/admin/products">Sản phẩm</a>
  <a href="/admin/categories" class="active">Danh mục</a>
  <a href="/admin/orders">Đơn hàng</a>
  <a href="/admin/vouchers">Voucher</a>
  <a href="/admin/users">Người dùng</a>
  <a href="/logout">Đăng xuất</a>
</aside>
<main>
  <h1>Danh mục</h1>
  <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
  <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

  <form class="inline-form" action="/admin/categories" method="post">
    <input type="hidden" name="categoryId" th:value="${category.categoryId}"/>
    <input type="text" name="categoryName" placeholder="Tên danh mục" th:value="${category.categoryName}" required/>
    <button type="submit" th:text="${category.categoryId != null ? 'Cập nhật' : 'Thêm'}">Thêm / Cập nhật</button>
    <a th:if="${category.categoryId != null}" href="/admin/categories" style="margin-left:8px;color:#888;">Hủy sửa</a>
  </form>

  <table>
    <thead><tr><th>#</th><th>Tên</th><th>Thao tác</th></tr></thead>
    <tbody>
    <tr th:each="c, index : ${categories}">
      <td th:text="${index.count}"></td>
      <td th:text="${c.categoryName}">Name</td>
      <td class="row-actions">
        <a th:href="@{/admin/categories(editId=${c.categoryId})}">
          <button type="button" class="btn-edit">Sửa</button>
        </a>
        <form th:action="@{/admin/categories/delete/{id}(id=${c.categoryId})}" method="post" style="display:inline;"
              onsubmit="return confirm('Xóa danh mục này?');">
          <button type="submit" class="btn-delete">Xóa</button>
        </form>
      </td>
    </tr>
    </tbody>
  </table>
</main>
</body>
</html>
