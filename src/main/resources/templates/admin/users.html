<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>Người dùng | HatHub</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet"/>
  <style>
    body { font-family:'Nunito',sans-serif; margin:0; display:flex; min-height:100vh; }
    aside { width:220px; background:#111; color:#fff; padding:1.5rem; }
    aside a { display:block; color:#ccc; text-decoration:none; padding:0.6rem 0; }
    aside a.active { color:#C0633A; }
    main { flex:1; padding:2rem; background:#F5F0EA; }
    table { width:100%; background:#fff; border-collapse:collapse; margin-bottom:2rem; }
    th, td { padding:0.75rem; border-bottom:1px solid #eee; }
    th { background:#111; color:#fff; }
    form { background:#fff; padding:1.5rem; border-radius:8px; }
    input { padding:8px; border:1px solid #ddd; margin:0.25rem 0.5rem 0.25rem 0; }
    button { background:#C0633A; color:#fff; border:none; padding:8px 16px; cursor:pointer; }
    .success { background:#d4edda; padding:1rem; border-radius:4px; margin-bottom:1rem; }
    .error { background:#f8d7da; padding:1rem; border-radius:4px; margin-bottom:1rem; }
  </style>
</head>
<body>
<aside>
  <h2 style="color:#C0633A;">HatHub Admin</h2>
  <a href="/admin/dashboard">Dashboard</a>
  <a href="/admin/products">Sản phẩm</a>
  <a href="/admin/categories">Danh mục</a>
  <a href="/admin/orders">Đơn hàng</a>
  <a href="/admin/vouchers">Voucher</a>
  <a href="/admin/users" class="active">Người dùng</a>
  <a href="/logout">Đăng xuất</a>
</aside>
<main>
  <h1>Người dùng</h1>
  <div th:if="${success}" class="success" th:text="${success}"></div>
  <div th:if="${error}" class="error" th:text="${error}"></div>

  <form action="/admin/users/employee" method="post">
    <h3>Tạo nhân viên mới</h3>
    <input type="text" name="username" placeholder="Username" required/>
    <input type="password" name="password" placeholder="Password" required/>
    <input type="email" name="email" placeholder="Email"/>
    <input type="text" name="phone" placeholder="Phone"/>
    <button type="submit">Tạo nhân viên</button>
  </form>

  <table>
    <thead><tr><th>#</th><th>Username</th><th>Email</th><th>Role</th><th>Trạng thái</th><th></th></tr></thead>
    <tbody>
      <tr th:each="u, index : ${users}">
        <td th:text="${index.count}">1</td>
        <td th:text="${u.username}">user</td>
        <td th:text="${u.email}">email</td>
        <td th:text="${u.role.roleName}">ROLE</td>
        <td th:text="${u.status ? 'Hoạt động' : 'Khóa'}">status</td>
        <td>
<!--          <span th:if="${session.user.userID == u.userID}">Tài khoản đang sử dụng</span>-->
          <form th:action="@{/admin/users/toggle/{id}(id=${u.userID})}" method="post">
            <button type="submit" th:text="${u.status ? 'Khóa' : 'Mở khóa'}">Toggle</button>
          </form>
        </td>
      </tr>
    </tbody>
  </table>
</main>
</body>
</html>
