<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>Quản lý sản phẩm | HatHub</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet"/>
  <style>
    body { font-family:'Nunito',sans-serif; margin:0; display:flex; min-height:100vh; }
    aside { width:220px; background:#111; color:#fff; padding:1.5rem; }
    aside a { display:block; color:#ccc; text-decoration:none; padding:0.6rem 0; }
    aside a.active { color:#C0633A; }
    main { flex:1; padding:2rem; background:#F5F0EA; }
    table { width:100%; background:#fff; border-collapse:collapse; }
    th, td { padding:0.75rem; border-bottom:1px solid #eee; text-align:left; }
    th { background:#111; color:#fff; }
    .btn { background:#C0633A; color:#fff; padding:8px 16px; text-decoration:none; border-radius:4px; display:inline-block; margin-bottom:1rem; }
  </style>
</head>
<body>
<aside>
  <h2 style="color:#C0633A;">HatHub Admin</h2>
  <a href="/admin/dashboard">Dashboard</a>
  <a href="/admin/products" class="active">Sản phẩm</a>
  <a href="/admin/categories">Danh mục</a>
  <a href="/admin/orders">Đơn hàng</a>
  <a href="/admin/vouchers">Voucher</a>
  <a href="/admin/users">Người dùng</a>
  <a href="/logout">Đăng xuất</a>
</aside>
<main>
  <h1>Sản phẩm</h1>
  <a href="/admin/products/new" class="btn">+ Thêm sản phẩm</a>
  <table>
    <thead><tr><th>#</th><th>Tên</th><th>Danh mục</th><th>Trạng thái</th><th></th></tr></thead>
    <tbody>
      <tr th:each="p, index : ${products}">
        <td th:text="${index.count}">1</td>
        <td th:text="${p.productName}">Name</td>
        <td th:text="${p.category.categoryName}">Cat</td>
        <td th:text="${p.status ? 'Đang bán' : 'Ẩn'}">status</td>
        <td>
          <a class="btn btn-primary" th:href="@{/admin/products/edit/{id}(id=${p.productId})}">Sửa</a>
          <form th:action="@{/admin/products/delete/{id}(id=${p.productId})}" method="post" style="display:inline;">
            <button type="submit" style="background:#c00;color:#fff;border:none;padding:4px 8px;cursor:pointer;">Xóa</button>
          </form>
        </td>
      </tr>
    </tbody>
  </table>
</main>
</body>
</html>
