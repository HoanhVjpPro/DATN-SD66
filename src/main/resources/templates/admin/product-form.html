<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title th:text="${product.productId != null ? 'Sửa sản phẩm' : 'Thêm sản phẩm'} + ' | HatHub'">Product Form</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet"/>
  <style>
    body { font-family:'Nunito',sans-serif; margin:0; display:flex; min-height:100vh; }
    aside { width:220px; background:#111; color:#fff; padding:1.5rem; }
    aside a { display:block; color:#ccc; text-decoration:none; padding:0.6rem 0; }
    main { flex:1; padding:2rem; background:#F5F0EA; }
    .card { background:#fff; padding:1.5rem; border-radius:8px; margin-bottom:1.5rem; }
    label { display:block; font-weight:700; margin:0.75rem 0 0.25rem; }
    input, select, textarea { width:100%; padding:8px; border:1px solid #ddd; border-radius:4px; }
    button { background:#C0633A; color:#fff; border:none; padding:10px 20px; cursor:pointer; margin-top:1rem; }
    table { width:100%; border-collapse:collapse; margin-top:1rem; }
    td, th { padding:0.5rem; border-bottom:1px solid #eee; text-align:left; }
    .success { background:#d4edda; padding:1rem; border-radius:4px; margin-bottom:1rem; }
    .stock-low { color:#c0392b; font-weight:700; }
    .stock-out { color:#fff; background:#c0392b; padding:2px 8px; border-radius:4px; font-size:0.8rem; }
    .topbar { display:flex; align-items:center; justify-content:space-between; margin-bottom:1.5rem; }
    .topbar h1 { font-size:1.4rem; font-weight:900; }
    .btn-back { background:#444; color:#fff; padding:8px 18px; text-decoration:none; font-weight:700; font-size:0.85rem; border-radius:4px; }
  </style>
</head>
<body>
<aside>
  <h2 style="color:#C0633A;">HatHub Admin</h2>
  <a href="/admin/dashboard">Dashboard</a>
  <a href="/admin/products">Sản phẩm</a>
  <a href="/admin/categories">Danh mục</a>
  <a href="/admin/orders" class="active">Đơn hàng</a>
  <a href="/admin/vouchers">Voucher</a>
  <a href="/admin/users">Người dùng</a>
  <a href="/logout">Đăng xuất</a>
</aside>
<main>
  <div class="topbar">
    <h1 th:text="${product.productId != null ? 'Sửa sản phẩm' : 'Thêm sản phẩm'}">Form</h1>
    <a href="/admin/products" class="btn-back">← Quay lại</a>
  </div>
  <div th:if="${success}" class="success" th:text="${success}"></div>
  <div class="card">
    <form action="/admin/products/save" method="post">
      <input type="hidden" name="productId" th:value="${product.productId}"/>
      <label>Tên sản phẩm</label>
      <input type="text" name="productName" th:value="${product.productName}" required/>
      <label>Danh mục</label>
      <select name="categoryId" required>
        <option th:each="c : ${categories}" th:value="${c.categoryId}" th:text="${c.categoryName}"
                th:selected="${product.category != null and product.category.categoryId == c.categoryId}"></option>
      </select>
      <label>Mô tả</label>
      <textarea name="description" rows="4" th:text="${product.description}"></textarea>
      <label><input type="checkbox" name="status" value="true" th:checked="${product.status == null or product.status}" style="width:auto;"/> Đang bán</label>
      <button type="submit">Lưu sản phẩm</button>
    </form>
  </div>

  <div class="card" th:if="${product.productId != null}">
    <h3>Biến thể (Size / Màu / Giá / Tồn kho)</h3>

    <!-- FORM THÊM MỚI -->
    <form th:action="@{/admin/products/{id}/detail(id=${product.productId})}" method="post">
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr 1fr auto;gap:0.5rem;align-items:end;">
        <div><label>Size</label><input name="size" required/></div>
        <div><label>Màu</label><input name="color" required/></div>
        <div><label>Giá</label><input name="price" min="0" type="number" step="1000" required/></div>
        <div><label>SKU</label><input name="sku"/></div>
        <div><label>Tồn kho</label><input name="stockQuantity" type="number" value="0" min="0" required/></div>
        <button type="submit" style="margin-top:1.5rem;">Thêm</button>
      </div>
    </form>

    <!-- BẢNG BIẾN THỂ -->
    <table th:if="${details != null}">
      <tr>
        <th>Size</th><th>Màu</th><th>Giá</th><th>SKU</th><th>Tồn kho</th><th>Thao tác</th>
      </tr>
      <tr th:each="d : ${details}">
        <form th:action="@{/admin/products/detail/update/{id}(id=${d.productDetailId})}" method="post">
          <input type="hidden" name="productId" th:value="${product.productId}"/>
          <td><input name="size"          type="text"   th:value="${d.size}"          required style="padding:4px;border:1px solid #ddd;width:100%;"/></td>
          <td><input name="color"         type="text"   th:value="${d.color}"         required style="padding:4px;border:1px solid #ddd;width:100%;"/></td>
          <td><input name="price"         type="number" th:value="${d.price}"         step="1000" required style="padding:4px;border:1px solid #ddd;width:100%;" min="0"/></td>
          <td><input name="sku"           type="text"   th:value="${d.sku}"                   style="padding:4px;border:1px solid #ddd;width:100%;"/></td>
          <td>
            <input name="stockQuantity" type="number" th:value="${d.stockQuantity != null ? d.stockQuantity : 0}" min="0" required style="padding:4px;border:1px solid #ddd;width:70px;"/>
            <span th:if="${d.stockQuantity != null and d.stockQuantity == 0}"  style="color:#c00;font-size:0.75rem;display:block;">Hết hàng</span>
            <span th:if="${d.stockQuantity != null and d.stockQuantity > 0 and d.stockQuantity <= 5}" style="color:#e67e22;font-size:0.75rem;display:block;">Sắp hết</span>
          </td>
          <td style="display:flex;gap:6px;align-items:center;padding:8px 4px;">
            <!-- NÚT LƯU -->
            <button type="submit" style="background:#444;color:#fff;border:none;padding:4px 10px;cursor:pointer;">Lưu</button>
        </form>
        <!-- NÚT XÓA — form riêng ngoài form sửa -->
        <form th:action="@{/admin/products/detail/delete/{id}(id=${d.productDetailId})}" method="post" style="display:inline;">
          <input type="hidden" name="productId" th:value="${product.productId}"/>
          <button type="submit" style="background:#c00;color:#fff;border:none;padding:4px 10px;cursor:pointer;"
                  onclick="return confirm('Xóa biến thể này?')">Xóa</button>
        </form>
        </td>
      </tr>
    </table>

    <!-- UPLOAD ẢNH -->
    <h3 style="margin-top:1.5rem;">Upload ảnh</h3>
    <form th:action="@{/admin/products/{id}/image(id=${product.productId})}" method="post" enctype="multipart/form-data">
      <input type="file" name="file" accept="image/*" required/>
      <label><input type="checkbox" name="isDefault" value="true" checked style="width:auto;"/> Ảnh mặc định</label>
      <button type="submit">Upload</button>
    </form>
  </div>
</main>
</body>
</html>
