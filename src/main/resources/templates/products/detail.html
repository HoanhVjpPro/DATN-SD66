<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title th:text="${product.productName} + ' | HatHub'">Sản phẩm | HatHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Oswald:wght@500;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" th:href="@{/shop.css}" />
  <style>
    .variant-options{display:flex !important;flex-wrap:wrap;gap:8px;margin:10px 0 4px;}
    .variant-options label{position:relative !important;display:inline-flex !important;width:auto !important;margin:0 !important;}
    .variant-options input[type=radio]{position:absolute;opacity:0;width:1px;height:1px;}
    .variant-chip{display:inline-flex !important;align-items:center;padding:9px 14px;border-radius:8px;
      border:1.5px solid #ccc;background:#fff;color:#333;font-size:13px;cursor:pointer;transition:all .15s;white-space:nowrap;}
    .variant-options input[type=radio]:checked + .variant-chip{border-color:#C0633A;background:#C0633A;color:#fff;font-weight:700;}
    .variant-options input[type=radio]:disabled + .variant-chip{opacity:.4;cursor:not-allowed;text-decoration:line-through;}
    .reviews-placeholder{color:#999;font-size:14px;padding:24px 0;text-align:center;}
  </style>
</head>
<body class="page">
<div class="promo-bar">Miễn phí giao hàng từ 299K | Đổi trả trong 30 ngày</div>

<nav class="shop-nav">
  <a href="/" class="brand"><span class="brand-mark">H</span><span>HatHub</span></a>
  <ul class="nav-menu">
    <li><a th:href="@{/products}">Sản phẩm</a></li>
    <li><a href="/orders" th:if="${loggedIn and roleName == 'CUSTOMER'}">Đơn hàng</a></li>
  </ul>
  <div class="nav-actions">
    <a class="icon-link" th:if="${loggedIn}" href="/profile" aria-label="Tài khoản">◎</a>
    <a class="icon-link" th:unless="${loggedIn}" href="/login" aria-label="Đăng nhập">◎</a>
    <a th:if="${loggedIn and roleName == 'CUSTOMER'}" href="/cart" class="cart-link">Giỏ</a>
  </div>
</nav>

<main class="page-wrap">
  <div class="breadcrumb">
    <a href="/">Trang chủ</a> / <a th:href="@{/products}">Sản phẩm</a> / <span th:text="${product.productName}">Tên sản phẩm</span>
  </div>

  <section class="product-detail">
    <div class="gallery-main">
      <img th:src="${imageUrl}" th:alt="${product.productName}" />
    </div>

    <div class="detail-panel">
      <p class="kicker" th:text="${product.category.categoryName}">Category</p>
      <h1 th:text="${product.productName}">Tên sản phẩm</h1>

      <div class="detail-price" id="priceDisplay"
           th:text="${selectedDetail != null ? #numbers.formatDecimal(selectedDetail.price, 0, 'COMMA', 0, 'POINT') + ' đ' : 'Liên hệ'}">0 đ</div>

      <p class="detail-desc" th:text="${product.description}">Mô tả sản phẩm</p>

      <div th:if="${success}" class="alert success" th:text="${success}"></div>
      <div th:if="${error}" class="alert error" th:text="${error}"></div>

      <form class="form-box" id="addToCartForm" th:action="@{/products/{id}/add-to-cart(id=${product.productId})}" method="post">
        <div th:if="${details != null and !#lists.isEmpty(details)}">
          <label>Chọn biến thể (Size / Màu)</label>
          <div class="variant-options">
            <label th:each="d, iter : ${details}">
              <input type="radio" name="productDetailId" th:value="${d.productDetailId}"
                     th:checked="${iter.index == 0}"
                     th:attr="data-stock=${d.stockQuantity != null ? d.stockQuantity : 0}, data-price=${d.price}"
                     th:disabled="${d.stockQuantity == null or d.stockQuantity == 0}"
                     onchange="onVariantChange(this)" required/>
              <span class="variant-chip" th:text="${d.size} + ' / ' + ${d.color} + (${d.stockQuantity != null and d.stockQuantity == 0} ? ' (Hết hàng)' : '')">Size/Color</span>
            </label>
          </div>
          <p style="font-size:13px;margin-top:6px;" id="stockDisplay">
            <span th:if="${selectedDetail != null and selectedDetail.stockQuantity != null and selectedDetail.stockQuantity > 0}"
                  style="color:#666;" th:text="'Còn ' + ${selectedDetail.stockQuantity} + ' sản phẩm'">Còn hàng</span>
            <span th:if="${selectedDetail == null or selectedDetail.stockQuantity == null or selectedDetail.stockQuantity == 0}" style="color:#e53e3e;">Hết hàng</span>
          </p>
        </div>

        <div th:unless="${details != null and !#lists.isEmpty(details)}" class="alert error">
          Sản phẩm hiện chưa có biến thể nào để chọn mua.
        </div>

        <div class="size-row">
          <div><label>Số lượng</label>
            <input type="number" name="quantity" id="quantityInput" value="1" min="1"
                   th:max="${selectedDetail != null ? selectedDetail.stockQuantity : 1}" /></div>
        </div>

        <button class="btn btn-primary" type="submit" id="addToCartBtn"
                th:disabled="${details == null or #lists.isEmpty(details) or selectedDetail == null or selectedDetail.stockQuantity == null or selectedDetail.stockQuantity == 0}">
          Thêm vào giỏ
        </button>
        <a class="btn btn-outline" th:href="@{/products}">Tiếp tục xem sản phẩm</a>
      </form>
    </div>
  </section>

  <!-- Phần đánh giá: chờ tích hợp ReviewService -->
  <section class="reviews">
    <div class="section-head"><h2>Đánh giá</h2></div>
    <div class="cart-card">
      <div class="reviews-placeholder">WIP</div>
    </div>
  </section>
</main>

<script>
  // Khi người dùng chọn biến thể khác -> cập nhật giá, tồn kho, max số lượng,
  // và bật/tắt nút "Thêm vào giỏ" theo thời gian thực (không cần reload trang)
  function onVariantChange(radio) {
    const stock = parseInt(radio.getAttribute('data-stock'), 10) || 0;
    const price = parseFloat(radio.getAttribute('data-price')) || 0;

    const btn = document.getElementById('addToCartBtn');
    const qtyInput = document.getElementById('quantityInput');
    const stockDisplay = document.getElementById('stockDisplay');
    const priceDisplay = document.getElementById('priceDisplay');

    priceDisplay.textContent = price.toLocaleString('vi-VN') + ' đ';

    if (stock > 0) {
      stockDisplay.innerHTML = '<span style="color:#666;">Còn ' + stock + ' sản phẩm</span>';
      btn.disabled = false;
      qtyInput.max = stock;
      if (parseInt(qtyInput.value, 10) > stock) qtyInput.value = stock;
    } else {
      stockDisplay.innerHTML = '<span style="color:#e53e3e;">Hết hàng</span>';
      btn.disabled = true;
      qtyInput.max = 1;
    }
  }
</script>

</body>
</html>
